name: Build and publish Docker image

# Build the site into an nginx-serving Docker image and push it to GHCR
# (GitHub Container Registry) on every push to main and on tags.
#
# The image lands at:
#   ghcr.io/<owner>/<repo>:latest          ← rolling latest on main
#   ghcr.io/<owner>/<repo>:sha-<sha>       ← every commit on main
#   ghcr.io/<owner>/<repo>:vX.Y.Z          ← from tag refs
#
# A server pulls the image with:
#   docker pull ghcr.io/<owner>/<repo>:latest
# See docs/deploying.md for the full server-setup walkthrough.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for build attestation
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip login on pull-request runs from forks (no write access to
        # secrets) — we still want to build to verify the Dockerfile works.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tagging strategy:
          #  - `latest` and `main` for the head of main
          #  - `sha-<short>` for every push (so deploys can pin to a commit)
          #  - `vX.Y.Z` from semver tags
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=quitting7oh.org
            org.opencontainers.image.description=Community recovery information site for 7-OH and kratom synthetics
            org.opencontainers.image.url=https://quitting7oh.org
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          # Multi-arch so the same image works on amd64 servers and arm64
          # (Hetzner ampere, Oracle Ampere A1, Raspberry Pi, M-series VMs).
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate build attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
