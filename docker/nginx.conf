# nginx config for serving the quitting7oh.org static site.
# Lives in the container at /etc/nginx/conf.d/default.conf.

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- Compression ----------
    # nginx alpine includes gzip; brotli requires a separate module so we
    # stick to gzip here. Most CDNs/edges will recompress to brotli anyway.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # ---------- Security headers ----------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=(), browsing-topics=()" always;
    # Strict-Transport-Security is set by the reverse proxy (Caddy / Cloudflare)
    # that terminates TLS in front of this container — don't double-set it.

    # ---------- Asset caching ----------
    # Astro emits hashed filenames under /_astro/, so we can immutable-cache them.
    location ^~ /_astro/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Pagefind index files are content-keyed by content hash too.
    location ^~ /pagefind/ {
        access_log off;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # Static images, fonts, etc.
    location ~* \.(?:ico|svg|png|jpg|jpeg|gif|webp|avif|woff2|woff|ttf|otf)$ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # ---------- HTML routing ----------
    # Astro emits trailing-slash-less URLs like /start-here/welcome that resolve
    # to /start-here/welcome/index.html. Use try_files to fall back through:
    #   1. exact match
    #   2. /<path>.html
    #   3. /<path>/index.html
    #   4. 404 page
    location / {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri $uri.html $uri/ $uri/index.html /404.html;
    }

    # ---------- 404 ----------
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ---------- Health endpoint (used by Docker HEALTHCHECK) ----------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Hide nginx version
    server_tokens off;
}
